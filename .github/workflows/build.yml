name: Formplayer tests

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:
    inputs:
      commcare_core_sha:
        description: 'commcare-core SHA to test against'
        required: false
      commcare_core_pr:
        description: 'commcare-core PR number for status reporting'
        required: false
      commcare_core_check_name:
        description: 'Status check name to report back to commcare-core'
        required: false

jobs:
  build:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:10
        env:
          POSTGRES_DB: formplayer
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      MALLOC_ARENA_MAX: 1
      GRADLE_OPTS: -Xmx512m
      POSTGRESQL_HOST: localhost
      POSTGRESQL_USERNAME: postgres
      POSTGRESQL_PASSWROD: postgres
      REDIS_HOSTNAME: localhost
      COMMCARE_HOST: http://localhost:8000
      AUTH_KEY: secretkey
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Override commcare-core for cross-repo CI
        if: ${{ inputs.commcare_core_sha }}
        uses: actions/checkout@v4
        with:
          repository: dimagi/commcare-core
          ref: ${{ inputs.commcare_core_sha }}
          path: libs/commcare
      - name: Generate GitHub App token
        if: ${{ always() && inputs.commcare_core_check_name }}
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.CROSS_REPO_CI_APP_ID }}
          private-key: ${{ secrets.CROSS_REPO_CI_PRIVATE_KEY }}
          owner: dimagi
          repositories: commcare-core
      - name: Set up JDK
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'adopt'
      - name: Setup config
        run: |
          cp .github/gradle.properties.ci gradle.properties
      - name: Copy Test Resources
        uses: gradle/gradle-build-action@v3
        with:
          arguments: copyTestResources
      - name: Run all tests and checks
        uses: gradle/gradle-build-action@v3
        with:
          arguments: check
      - name: Codecov upload
        env:
          TOKEN: ${{ secrets.CODECOV_TOKEN }}
        if: env.TOKEN != ''
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: true
      - name: Report status to commcare-core
        if: ${{ always() && inputs.commcare_core_check_name }}
        uses: actions/github-script@v7
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const state = '${{ job.status }}' === 'success' ? 'success' : 'failure';
            const description = state === 'success' ? 'Tests passed' : 'Tests failed';
            await github.rest.repos.createCommitStatus({
              owner: 'dimagi',
              repo: 'commcare-core',
              sha: '${{ inputs.commcare_core_sha }}',
              state,
              context: '${{ inputs.commcare_core_check_name }}',
              description,
              target_url: `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`
            });
